PIPELINE: 'vae_trainer.VAETrainer'
WANDB_ENTITY: 'xchu_ut'
WANDB_PROJECT: 'UniLS'
DUMP_DIR: './outputs'


DATASET:
  NAME: 'TalkMotionOnly'
  LOADER: 'motion_data.TalkMotionOnlyData'
  CLIP_LENGTH: 100
  PREV_LENGTH: 100
  STYLE_LENGTH: 100
  MOTION_FPS: 25
  AUDIO_SAMPLE_RATE: 16000
  DATA_PATH: '/your_dataset_path/UniLSTalkDataset/TalkMotionOnly/data_lmdb'
  META_PATH: '/your_dataset_path/UniLSTalkDataset/TalkMotionOnly/talk_motion.json'


MODEL:
  NAME: 'UniLSFreeGen'
  LOADER: 'unils_freegen.UniLSFreeGen'
  T_DEPTH: 8
  T_NUM_HEAD: 8
  T_EMBED_DIM: 512

  FLIP_QUANT: 0.3
  PREV_FREE: 0.1
  STYLE_FREE: 0.1

  VAE_CONFIG:
    LOADER: 'unils_codec.UniLSCodec'
    MOTION_DIM: 108 # 100 + 3 + 1 + 2 + 2
    V_CODE_DIM: 32
    V_PATCH_NUMS: [1, 5, 25, 50, 100]
    T_DEPTH: 8
    T_NUM_HEADS: 8
    T_HIDDEN_DIM: 512
    STATS_PATH: '/your_dataset_path/UniLSTalkDataset/TalkMotionOnly/talk_motion_stats.json'
    VAE_PATH: './your_model_path/iter_50000.pt'
    

TRAINER:
  # TRAIN LOOP
  BATCH_SIZE: 128
  TRAIN_ITER: 600000
  CHECK_INTERVAL: 50000

  # OPTIMIZER
  NAME: 'Adam'
  WARMUP_ITER: 1000
  LR_DECAY_RATE: 0.1
  LR_DECAY_ITER: 600000
  LEARNING_RATE: 1.0e-4

  # EMA
  USING_EMA: True
  EMA_DECAY: 0.9999
  EMA_UPDATE_FREQ: 1


LOSS_KWARGS:
  CE_WEIGHT: 1.0