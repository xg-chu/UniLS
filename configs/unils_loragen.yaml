PIPELINE: 'arlora_trainer.ARLoRATrainer'
WANDB_ENTITY: 'xchu_ut'
WANDB_PROJECT: 'UniLS'
DUMP_DIR: './outputs'


DATASET:
  NAME: 'SeamlessInteractionTalk'
  LOADER: 'sitalk_data.SeamlessInteractionTalkData'
  CLIP_LENGTH: 100
  PREV_LENGTH: 100
  STYLE_LENGTH: 100
  MOTION_FPS: 25
  AUDIO_SAMPLE_RATE: 16000
  DATA_PATH: '/home/mil/x-chu/workspace/Data_umiushi/UniLSTalkDataset/SeamlessInteractionTalk/data_lmdb'
  META_PATH: '/home/mil/x-chu/workspace/Data_umiushi/UniLSTalkDataset/SeamlessInteractionTalk/seamless_interaction_pairs.json'


MODEL:
  NAME: 'UniLSLoRAGen'
  LOADER: 'unils_gen.UniLSGen'
  AUDIO_ENCODER: 'wav2vec'
  T_DEPTH: 8
  T_NUM_HEAD: 8
  T_EMBED_DIM: 512
  
  FLIP_QUANT: 0.3
  PREV_FREE: 0.1
  AUDIO_FREE: 0.1
  STYLE_FREE: 0.1

  PRETRAIN_PATH: '/home/mil/x-chu/workspace/UniLS/outputs/UniLSFreeGen_TalkMotionOnly/Mar07_1228_bodmr/checkpoints/iter_50000.pt'

  VAE_CONFIG:
    LOADER: 'unils_codec.UniLSCodec'
    MOTION_DIM: 108 # 100 + 3 + 1 + 2 + 2
    V_CODE_DIM: 32
    V_PATCH_NUMS: [1, 10, 20, 50, 100]
    T_DEPTH: 8
    T_NUM_HEADS: 8
    T_HIDDEN_DIM: 512
    STATS_PATH: '/home/mil/x-chu/workspace/Data_umiushi/UniLSTalkDataset/TalkMotionOnly/talk_motion_stats.json'
    VAE_PATH: '/home/mil/x-chu/workspace/UniLS/outputs/UniLSCodec_TalkMotionOnly/Mar07_0027_qrmvb/checkpoints/iter_50000.pt'
    

TRAINER:
  # TRAIN LOOP
  BATCH_SIZE: 128
  TRAIN_ITER: 200000
  CHECK_INTERVAL: 20000

  # OPTIMIZER
  NAME: 'Adam'
  WARMUP_ITER: 1000
  LR_DECAY_RATE: 0.1
  LR_DECAY_ITER: 200000
  LEARNING_RATE: 1.0e-4

  # EMA
  USING_EMA: True
  EMA_DECAY: 0.9999
  EMA_UPDATE_FREQ: 1


LOSS_KWARGS:
  CE_WEIGHT: 1.0